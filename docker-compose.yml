version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FRONTEND_ORIGIN=http://localhost:5173
      - DNS_SERVERS=8.8.8.8,1.1.1.1
      - MT_HOST=${MT_HOST:-}
      - MT_USER=${MT_USER:-admin}
      - MT_PASS=${MT_PASS:-}
      - MT_PORT=${MT_PORT:-8728}
      - SCHEDULER_INTERVAL_HOURS=${SCHEDULER_INTERVAL_HOURS:-6}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
