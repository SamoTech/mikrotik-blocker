<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c0a"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#ffab40"/>
    </linearGradient>
    <pattern id="dot" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1" fill="#0d1f17"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dot)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="320" fill="url(#acc)"/>

  <!-- Router icon (left) -->
  <g transform="translate(72, 88)" filter="url(#glow)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#060c0a" stroke="url(#acc)" stroke-width="2.5"/>
    <!-- Router body -->
    <rect x="18" y="52" width="84" height="38" rx="7" fill="none" stroke="url(#acc)" stroke-width="2.2"/>
    <!-- Antenna left -->
    <line x1="32" y1="52" x2="24" y2="22" stroke="url(#acc)" stroke-width="2" stroke-linecap="round"/>
    <!-- Antenna right -->
    <line x1="88" y1="52" x2="96" y2="22" stroke="url(#acc)" stroke-width="2" stroke-linecap="round"/>
    <!-- LED dots -->
    <circle cx="34" cy="71" r="4" fill="#00c853"/>
    <circle cx="48" cy="71" r="4" fill="#00c853" opacity="0.6"/>
    <circle cx="62" cy="71" r="4" fill="url(#acc2)"/>
    <!-- Shield block symbol -->
    <path d="M72 60 L80 64 L80 76 L72 80 L64 76 L64 64 Z" fill="none" stroke="url(#acc2)" stroke-width="1.8"/>
    <line x1="72" y1="66" x2="72" y2="74" stroke="url(#acc2)" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="72" cy="78" r="1.5" fill="url(#acc2)"/>
  </g>

  <!-- Wordmark -->
  <text x="226" y="104" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#00c853" opacity="0.65" letter-spacing="5">MIKROTIK · SAMOTECH</text>
  <text x="222" y="178" font-family="Arial Black,'Arial Bold',sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="#f0fff4">MikroTik</text>
  <text x="222" y="222" font-family="Arial Black,'Arial Bold',sans-serif" font-size="52" font-weight="900" letter-spacing="-1" fill="url(#acc)">Blocker</text>

  <!-- Divider -->
  <rect x="224" y="234" width="460" height="2" fill="url(#acc)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="224" y="258" font-family="monospace" font-size="14" fill="#6b9e82">Block websites on MikroTik routers — DNS resolve, bulk input, RSC export &amp; API push</text>

  <!-- Feature pills -->
  <rect x="224" y="272" width="130" height="26" rx="13" fill="#00c853" fill-opacity="0.12"/>
  <text x="289" y="290" font-family="monospace" font-size="12" fill="#69f0ae" text-anchor="middle">DNS Resolution</text>

  <rect x="366" y="272" width="110" height="26" rx="13" fill="#ff6d00" fill-opacity="0.12"/>
  <text x="421" y="290" font-family="monospace" font-size="12" fill="#ffab40" text-anchor="middle">Bulk Input</text>

  <rect x="488" y="272" width="110" height="26" rx="13" fill="#00c853" fill-opacity="0.10"/>
  <text x="543" y="290" font-family="monospace" font-size="12" fill="#69f0ae" text-anchor="middle">RSC Export</text>

  <rect x="610" y="272" width="100" height="26" rx="13" fill="#ff6d00" fill-opacity="0.10"/>
  <text x="660" y="290" font-family="monospace" font-size="12" fill="#ffab40" text-anchor="middle">API Push</text>

  <!-- Right decorative: network block diagram -->
  <g opacity="0.18" transform="translate(860, 44)">
    <!-- Internet cloud outline -->
    <ellipse cx="195" cy="48" rx="72" ry="36" fill="none" stroke="#00c853" stroke-width="1.5"/>
    <text x="195" y="53" font-family="monospace" font-size="12" fill="#00c853" text-anchor="middle">INTERNET</text>
    <!-- Router box -->
    <rect x="148" y="108" width="94" height="40" rx="8" fill="#0a1510" stroke="#00c853" stroke-width="1.5"/>
    <text x="195" y="133" font-family="monospace" font-size="11" fill="#00c853" text-anchor="middle">MikroTik</text>
    <!-- Line cloud→router -->
    <line x1="195" y1="84" x2="195" y2="108" stroke="#00c853" stroke-width="1.2"/>
    <!-- Blocked domain -->
    <rect x="68" y="182" width="108" height="36" rx="8" fill="#0a1510" stroke="#ff6d00" stroke-width="1.5"/>
    <text x="122" y="204" font-family="monospace" font-size="10" fill="#ffab40" text-anchor="middle">tiktok.com ✗</text>
    <line x1="160" y1="148" x2="122" y2="182" stroke="#ff6d00" stroke-width="1" stroke-dasharray="4 3"/>
    <!-- Allowed domain -->
    <rect x="216" y="182" width="108" height="36" rx="8" fill="#0a1510" stroke="#00c853" stroke-width="1.5"/>
    <text x="270" y="204" font-family="monospace" font-size="10" fill="#69f0ae" text-anchor="middle">github.com ✓</text>
    <line x1="230" y1="148" x2="270" y2="182" stroke="#00c853" stroke-width="1" stroke-dasharray="4 3"/>
    <!-- RSC badge -->
    <rect x="140" y="238" width="110" height="24" rx="12" fill="#ff6d00" fill-opacity="0.15"/>
    <text x="195" y="255" font-family="monospace" font-size="10" fill="#ffab40" text-anchor="middle">/ip dns static</text>
  </g>

  <!-- Stack label -->
  <text x="224" y="312" font-family="monospace" font-size="12" fill="#3d6b52">Next.js · Vercel · RouterOS API · Docker</text>
</svg>